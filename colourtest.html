<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>敦煌壁畫色彩解密</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #1e1a15; 
            color: #f4ecd8;
            font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 95vh;
            position: relative;
        }

        /* 頂部標題區佈局 */
        .header-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            position: relative;
            margin-bottom: 25px;
        }

        h1 {
            color: #e2703a;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* 右上角 Logo 樣式 */
        .top-right-logo {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            height: 60px;
            width: auto;
            object-fit: contain;
        }

        /* 網頁主佈局 */
        .game-container {
            display: flex;
            flex-direction: row;
            gap: 30px;
            background: rgba(40, 32, 26, 0.9);
            padding: 25px;
            border-radius: 15px;
            border: 3px solid #8c6239;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            max-width: 1200px;
            width: 100%;
        }

        /* 左側：圖像展示與色塊 */
        .visual-section {
            flex: 1.3;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            background: rgba(20, 15, 10, 0.6);
            padding: 15px;
            border-radius: 10px;
        }

        /* 壁畫圖像區 */
        .mural-image-wrapper {
            width: 100%;
            height: 380px; 
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #8c6239;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            background: #15110e; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mural-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            transition: opacity 0.3s ease;
        }

        .color-display-row {
            display: flex;
            justify-content: space-around;
            width: 100%;
            gap: 20px;
            margin-top: 5px;
        }

        .color-box-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .color-box {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid #f4ecd8;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.4);
            transition: background-color 0.4s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 15px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            color: white;
        }

        /* 右側：題目內容與按鈕 */
        .control-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .info-header {
            font-weight: bold;
            color: #e2703a;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .mural-title-text {
            font-size: 18px;
            color: #f4ecd8;
            margin: 0 0 10px 0;
            border-bottom: 1px solid #5c4733;
            padding-bottom: 8px;
            line-height: 1.4;
        }

        .question-box {
            background: #3a2e24;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid #e2703a;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 12px;
        }

        .history-box {
            background: rgba(140, 98, 57, 0.15);
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 15px;
            border: 1px dashed #8c6239;
            color: #cdae88;
        }

        /* 五個固定顏料按鈕 */
        .btn-palette-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr); 
            gap: 8px;
            margin-bottom: 15px;
        }

        .color-btn {
            padding: 15px 2px;
            font-size: 14px;
            font-weight: bold;
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            text-align: center;
        }

        .color-btn:hover { transform: scale(1.05); }
        .color-btn.selected { border-color: #fff; box-shadow: 0 0 12px #fff; }

        /* 下一關按鈕 */
        .sys-btn {
            padding: 12px;
            background: #8c6239;
            color: #f4ecd8;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        .sys-btn:hover { background: #a67443; }

        #feedback {
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            height: 32px;
            margin-bottom: 10px;
        }
        .success { color: #4caf50; }
        .error { color: #f44336; }

        /* 網頁底部版權宣告 */
        footer {
            margin-top: 35px;
            font-size: 13px;
            color: #8c6239;
            text-align: center;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>🎨 敦煌壁畫色彩解密 🎨</h1>
        <img class="top-right-logo" src="images/logo_white.jpg" alt="Logo">
    </div>

    <div class="game-container">
        
        <div class="visual-section">
            <div class="mural-image-wrapper">
                <img id="muralImg" src="" alt="敦煌壁畫實例">
            </div>

            <div class="color-display-row">
                <div class="color-box-group">
                    <div style="margin-bottom: 6px; font-size: 13px; color:#bfa47e;">目標壁畫色</div>
                    <div id="targetColorBox" class="color-box">?</div>
                </div>
                
                <div class="color-box-group">
                    <div style="margin-bottom: 6px; font-size: 13px; color:#bfa47e;">目前調配出的顏色</div>
                    <div id="mixColorBox" class="color-box" style="background-color: #555;">未調色</div>
                </div>
            </div>
        </div>

        <div class="control-section">
            <div>
                <div class="info-header">🎨 莫高窟色彩修復：第 <span id="levelNum">1</span> / <span id="totalLevels">5</span> 關</div>
                <h2 id="muralTitle" class="mural-title-text">載入中...</h2>
                
                <div id="questionText" class="question-box">載入題目中...</div>
                <div id="historyText" class="history-box">載入歷史背景...</div>
                
                <p style="margin: 0 0 10px 0; font-size: 14px; color: #bfa47e;">🛠️ 請點選下方的基礎原色進行客製化調配（本關需要選 <span id="needCount">?</span> 種顏色）：</p>
                
                <div class="btn-palette-container">
                    <button class="color-btn" style="background-color: #c83c23;" onclick="clickPalette('大紅', this)">大紅</button>
                    <button class="color-btn" style="background-color: #295093;" onclick="clickPalette('天藍', this)">天藍</button>
                    <button class="color-btn" style="background-color: #2b7942;" onclick="clickPalette('翠綠', this)">翠綠</button>
                    <button class="color-btn" style="background-color: #dca034; color: #333;" onclick="clickPalette('土黃', this)">土黃</button>
                    <button class="color-btn" style="background-color: #ffffff; color: #333; border: 1px solid #ccc;" onclick="clickPalette('白粉', this)">白粉</button>
                </div>
            </div>

            <div>
                <div id="feedback"></div>
                <button id="nextBtn" class="sys-btn" onclick="nextLevel()" style="display:none;">進入下一幅壁畫修復 ➔</button>
            </div>
        </div>

    </div>

    <footer>
        © 2026 Hong Kong Gaudeamus Dunhuang Ensemble ALL RIGHTS RESERVED.
    </footer>

    <script>
        // ==========================================
        // ✨ 網站客製化設定區 (Levels Configuration) ✨
        // ==========================================
        const levels = [
            {
                colorName: "深赭色",
                muralTitle: "莫高窟 第257窟 《鹿王本生》",
                imgSrc: "images/莫高窟 第257窟 《鹿王本生》.jpg", 
                hexColor: "#7c3122", 
                history: "<b>【色彩象徵與材質】</b> 佛法莊嚴、尊貴感。敦煌早期洞窟最具代表性的顏色。源自天然赭石或代赭石，內含赤鐵礦中的鐵氧化物。",
                question: "「我們要修復九色鹿故事的經典底色『深赭色』。在精簡的五色中，需要混合哪兩種色調才能調出富有歲月感的紅褐色？」",
                ingredients: ["大紅", "土黃"] 
            },
            {
                colorName: "石綠",
                muralTitle: "莫高窟 第321窟 南壁 《十輪經變》中的飛天",
                imgSrc: "images/莫高窟 第321窟 南壁 《十輪經變》中的飛天 .jpg", 
                hexColor: "#60ad7e", 
                history: "<b>【色彩象徵與材質】</b> 用於營造『虛空』與『天界』的氛圍。源自石綠（孔雀石）或氯銅礦的研磨顏料。",
                question: "「飛天仙女身上那條輕飄的『石綠』色飄帶，在精簡五色中，需要混合哪四種元素才能重現這種溫潤清麗的亮綠？」",
                ingredients: ["白粉", "天藍", "翠綠", "土黃"]
            },
            {
                colorName: "砂綠",
                muralTitle: "莫高窟 第172窟 盛唐 《觀無量壽經變》",
                imgSrc: "images/莫高窟第172窟盛唐觀無量壽經變.jpg", 
                hexColor: "#3f7a55", 
                history: "<b>【色彩象徵與材質】</b> 用於描繪盛唐的青綠山水與極樂淨土。原文件配方使用了翠綠、大量土黃與微量白，有時搭配石英砂以製造顆粒質感。",
                question: "「在這幅氣勢宏大的西方淨土成幅畫面中，沉穩的『砂綠』山色在精簡五色中需要由哪兩種核心色進行調配？」",
                ingredients: ["翠綠", "土黃"]
            },
            {
                colorName: "雌黃",
                muralTitle: "莫高窟57窟南壁美人菩薩",
                imgSrc: "images/莫高窟57窟南壁美人菩薩.jpg", 
                hexColor: "#e5a93b", 
                history: "<b>【色彩象徵與材質】</b> 色澤明亮，常用於描繪佛陀的金色身軀、金飾、衣物邊緣，在壁畫中用來模擬金色的神聖光澤。",
                question: "「要修復美人菩薩身上熠熠生輝的『雌黃』飾品，在沒有中黃、橘黃的限制下，要如何利用精簡五色混合調出偏暖的亮金黃色？」",
                ingredients: ["大紅", "土黃"]
            },
            {
                colorName: "絹白",
                muralTitle: "敦煌莫高窟329窟 供養人與牛車 初唐",
                imgSrc: "images/敦煌莫高窟329窟 供养人与牛车 初唐.jpg", 
                hexColor: "#eae3d2", 
                history: "<b>【色彩象徵與材質】</b> 營造出大漠絲綢、貴族肌膚與歷史宣紙的溫潤底色。主要材質源自天然雲母、蛤粉。",
                question: "「要還原初唐出行圖中這溫潤如玉的『絹白』絲綢底色，需要在大量的白色基底中加入哪一種微量的顏色進行微調？」",
                ingredients: ["白粉", "土黃"]
            }
        ];

        // ==========================================
        // 核心邏輯控制區
        // ==========================================
        let currentLevel = 0;
        let selectedColors = [];

        function initLevel() {
            const level = levels[currentLevel];
            
            document.getElementById("levelNum").innerText = currentLevel + 1;
            document.getElementById("totalLevels").innerText = levels.length;
            document.getElementById("muralTitle").innerText = level.muralTitle;
            document.getElementById("questionText").innerText = level.question;
            document.getElementById("historyText").innerHTML = level.history;
            document.getElementById("needCount").innerText = level.ingredients.length;
            
            document.getElementById("targetColorBox").style.backgroundColor = level.hexColor;
            document.getElementById("targetColorBox").innerText = level.colorName;
            
            const imgElement = document.getElementById("muralImg");
            imgElement.style.opacity = 0;
            setTimeout(() => {
                imgElement.src = level.imgSrc;
                imgElement.style.opacity = 1;
            }, 200);

            selectedColors = [];
            document.getElementById("mixColorBox").style.backgroundColor = "#555";
            document.getElementById("mixColorBox").innerText = "未調色";
            document.getElementById("feedback").innerText = "";
            document.getElementById("nextBtn").style.display = "none";
            
            let btns = document.querySelectorAll('.color-btn');
            btns.forEach(btn => btn.classList.remove('selected'));
        }

        function clickPalette(colorName, btnElement) {
            const level = levels[currentLevel];
            
            if (selectedColors.includes(colorName)) {
                selectedColors = selectedColors.filter(c => c !== colorName);
                btnElement.classList.remove('selected');
            } else {
                if (selectedColors.length >= level.ingredients.length) return;
                selectedColors.push(colorName);
                btnElement.classList.add('selected');
            }

            const mixBox = document.getElementById("mixColorBox");
            if (selectedColors.length === 0) {
                mixBox.style.backgroundColor = "#555";
                mixBox.innerText = "未調色";
            } else {
                mixBox.innerText = `已選 ${selectedColors.length} 種...`;
                mixBox.style.backgroundColor = "#6e5540";
            }

            if (selectedColors.length === level.ingredients.length) {
                checkAnswer();
            }
        }

        function checkAnswer() {
            const level = levels[currentLevel];
            const feedback = document.getElementById("feedback");
            const mixBox = document.getElementById("mixColorBox");

            let matchCount = 0;
            level.ingredients.forEach(ing => {
                if (selectedColors.includes(ing)) matchCount++;
            });

            if (matchCount === level.ingredients.length) {
                mixBox.style.backgroundColor = level.hexColor;
                mixBox.innerText = "配方正確！";
                feedback.className = "success";
                feedback.innerText = "🎉 太棒了！色彩正確，修復成功！";
                document.getElementById("nextBtn").style.display = "block";
                
                if (currentLevel === levels.length - 1) {
                    document.getElementById("nextBtn").innerText = "🏆 完美修復所有傳世壁畫！";
                }
            } else {
                mixBox.style.backgroundColor = "#222";
                mixBox.innerText = "色調偏差...";
                feedback.className = "error";
                feedback.innerText = "❌ 調配的成分與公式不符，請再觀察看看！";
                
                setTimeout(() => {
                    if (selectedColors.length === level.ingredients.length) {
                        selectedColors = [];
                        mixBox.style.backgroundColor = "#555";
                        mixBox.innerText = "未調色";
                        feedback.innerText = "";
                        let btns = document.querySelectorAll('.color-btn');
                        btns.forEach(btn => btn.classList.remove('selected'));
                    }
                }, 1500);
            }
        }

        function nextLevel() {
            if (currentLevel < levels.length - 1) {
                currentLevel++;
                initLevel();
            } else {
                alert("🎉 恭喜完成！全班順利通過所有色彩修復考驗！");
                currentLevel = 0;
                initLevel();
            }
        }

        window.onload = initLevel;
    </script>
</body>
</html>
